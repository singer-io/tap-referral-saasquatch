version: 2.1
jobs:
  build:
    docker:
      - image: 218546966473.dkr.ecr.us-east-1.amazonaws.com/circle-ci:stitch-tap-tester-uv
    steps:
      - checkout
      - run:
          name: 'Setup virtual env'
          command: |
            uv venv --python 3.12 /usr/local/share/virtualenvs/tap-referral-saasquatch
            source /usr/local/share/virtualenvs/tap-referral-saasquatch/bin/activate
            uv pip install -U pip setuptools
            uv pip install .[dev]
      - add_ssh_keys
      - run:
          name: 'JSON Validator'
          command: |
            source /usr/local/share/virtualenvs/tap-tester/bin/activate
            stitch-validate-json /usr/local/share/virtualenvs/tap-referral-saasquatch/lib/python3.12/site-packages/tap_referral_saasquatch/schemas/*.json
      - run:
          name: 'Unit Tests'
          command: |
            source /usr/local/share/virtualenvs/tap-referral-saasquatch/bin/activate
            python -m unittest discover tests/unittests
      - run:
          name: 'Integration Tests'
          command: |
            source /usr/local/share/virtualenvs/tap-referral-saasquatch/bin/activate
            python -m unittest discover tests

workflows:
  version: 2
  commit:
    jobs:
      - build:
          context: circleci-user
  build_daily:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - build:
          context: circleci-user
